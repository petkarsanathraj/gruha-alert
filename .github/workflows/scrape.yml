name: Scrape KHB → Supabase

on:
  schedule:
    - cron: "30 3 * * *"   # 03:30 UTC = 09:00 IST daily
  workflow_dispatch: {}      # allow manual runs from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # OCR + PDF tools the scraper needs (same as the local Mac brew installs)
      - name: Install poppler + tesseract
        run: sudo apt-get update && sudo apt-get install -y poppler-utils tesseract-ocr

      - name: Run scraper (upsert to Supabase)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node worker/scrape.mjs
